name: TypeScript 7 RC QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      generated_modules:
        description: Number of many-file workload modules
        required: true
        default: "1500"
      type_heavy_files:
        description: Number of type-heavy source files
        required: true
        default: "120"
      real_world_files:
        description: Number of generated type-fest consumer files
        required: true
        default: "64"
      project_packages:
        description: Number of referenced projects
        required: true
        default: "12"
      project_files_per_package:
        description: Source files per referenced project
        required: true
        default: "60"
      benchmark_runs:
        description: Measured rounds per scenario
        required: true
        default: "15"
      benchmark_warmups:
        description: Warm-up rounds per scenario
        required: true
        default: "2"
      bootstrap_resamples:
        description: Bootstrap resamples for median confidence intervals
        required: true
        default: "2000"

concurrency:
  group: typescript-7-qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compatibility-and-benchmark:
    name: ${{ matrix.os }} / Node 22
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run QA harness
        run: npm run qa
        env:
          GENERATED_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.generated_modules || '300' }}
          TYPE_HEAVY_FILES: ${{ github.event_name == 'workflow_dispatch' && inputs.type_heavy_files || '24' }}
          REAL_WORLD_FILES: ${{ github.event_name == 'workflow_dispatch' && inputs.real_world_files || '24' }}
          PROJECT_PACKAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.project_packages || '4' }}
          PROJECT_FILES_PER_PACKAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.project_files_per_package || '12' }}
          BENCHMARK_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_runs || '3' }}
          BENCHMARK_WARMUPS: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_warmups || '1' }}
          BOOTSTRAP_RESAMPLES: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap_resamples || '400' }}
          BENCHMARK_SEED: "20260622"
          VERIFY_OUTPUT_STRICT: "true"
          EVIDENCE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && 'full-v2.1' || 'smoke-v2.1' }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os }}
          path: results/
          if-no-files-found: warn
          retention-days: 30
