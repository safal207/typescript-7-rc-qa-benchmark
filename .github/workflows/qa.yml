name: TypeScript 7 RC QA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      generated_modules:
        description: Number of generated TypeScript modules
        required: true
        default: "1500"
      benchmark_runs:
        description: Number of measured runs per scenario
        required: true
        default: "10"

permissions:
  contents: read

jobs:
  compatibility-and-benchmark:
    name: ${{ matrix.os }} / Node 22
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run QA harness
        run: npm run qa
        env:
          GENERATED_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.generated_modules || '500' }}
          BENCHMARK_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_runs || '3' }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os }}
          path: results/
          if-no-files-found: warn
